<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YASBe - 卡片管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:#191b1f;color:#e8e8ed;font-size:14px;line-height:1.5}

/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:#2c2c2c;min-height:100vh;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 16px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-icon{width:32px;height:32px;background:#FFCA00;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#000}
.logo-text{font-size:17px;font-weight:700;color:#fff;letter-spacing:.5px}
.sidebar-nav{flex:1;padding:12px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:#848493;font-size:13.5px;cursor:pointer;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.08);color:#e8e8ed}
.nav-item.active{background:rgba(255,202,0,.12);color:#FFCA00;font-weight:600}
.nav-item .icon{font-size:16px}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;background:#FFCA00;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000;flex-shrink:0}
.user-info{overflow:hidden}
.user-info .name{font-size:13px;color:#fff;font-weight:500}
.user-info div:last-child{font-size:11px;color:#848493}

.main{margin-left:220px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.top-header{background:#2c2c2c;padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90}
.top-header h1{font-size:18px;font-weight:700;color:#fff}
.top-header-right{display:flex;align-items:center;gap:12px}
.notif{background:none;border:none;font-size:18px;cursor:pointer;position:relative;padding:4px;color:#848493}
.notif .dot{position:absolute;top:2px;right:2px;width:7px;height:7px;background:#dc2626;border-radius:50%;border:2px solid #2c2c2c}
.avatar-btn{width:32px;height:32px;background:#FFCA00;border-radius:50%;border:none;color:#000;font-size:12px;font-weight:700;cursor:pointer}

.content{padding:24px 28px;flex:1}

/* ===== Cards ===== */
.card{background:#1f2128;border-radius:12px;border:1px solid rgba(255,255,255,.06);overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.card-header h2{font-size:15px;font-weight:600;color:#e8e8ed}
.card-body{padding:20px}

/* ===== Stats Bar ===== */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat-card{background:#1f2128;border-radius:10px;border:1px solid rgba(255,255,255,.06);padding:18px 20px}
.stat-card .label{font-size:12px;color:#848493;margin-bottom:6px}
.stat-card .value{font-size:24px;font-weight:700;color:#fff}
.stat-card .sub{font-size:11px;color:#848493;margin-top:4px}
.stat-card .value.gold{color:#FFCA00}

/* ===== Tabs ===== */
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,.06)}
.tab{padding:10px 20px;font-size:13px;color:#848493;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:#e8e8ed}
.tab.active{color:#FFCA00;border-bottom-color:#FFCA00;font-weight:600}

/* ===== Filter Bar ===== */
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#e8e8ed;font-size:13px;padding:8px 12px;outline:none;transition:border .15s}
.filter-bar input:focus,.filter-bar select:focus{border-color:#FFCA00}
.filter-bar input{width:200px}
.filter-bar input::placeholder{color:#5a5a6a}
.filter-bar select{width:150px;cursor:pointer}
.filter-bar select option{background:#2c2c2c;color:#e8e8ed}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-primary{background:#FFCA00;color:#000}
.btn-primary:hover{background:#e6b500}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.15);color:#848493}
.btn-outline:hover{border-color:#FFCA00;color:#FFCA00}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 8px;font-size:11px;border-radius:6px}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-warning{background:#d97706;color:#fff}
.btn-warning:hover{background:#b45309}
.btn-success{background:#16a34a;color:#fff}
.btn-success:hover{background:#15803d}

/* ===== Table ===== */
table{width:100%;border-collapse:collapse}
table th{text-align:left;padding:12px 16px;font-size:12px;font-weight:600;color:#848493;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid rgba(255,255,255,.06);white-space:nowrap}
table td{padding:12px 16px;font-size:13px;color:#e8e8ed;border-bottom:1px solid rgba(255,255,255,.04)}
table tr:hover td{background:rgba(255,202,0,.03)}
table tr:last-child td{border-bottom:none}

/* ===== Badges ===== */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-active{background:rgba(22,163,74,.15);color:#4ade80}
.badge-inactive{background:rgba(100,116,139,.15);color:#94a3b8}
.badge-frozen{background:rgba(217,119,6,.15);color:#fbbf24}
.badge-pending{background:rgba(59,130,246,.15);color:#60a5fa}
.badge-canceled{background:rgba(220,38,38,.15);color:#f87171}

/* ===== Card Number ===== */
.card-num{font-family:"SF Mono","Fira Code","Consolas",monospace;font-size:13px;letter-spacing:.5px}

/* ===== KYB Block Page ===== */
.kyb-block{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 40px}
.kyb-block .icon-wrap{width:80px;height:80px;background:rgba(255,202,0,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:24px}
.kyb-block h2{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px}
.kyb-block p{font-size:14px;color:#848493;max-width:480px;margin-bottom:32px;line-height:1.7}
.kyb-block .btn-lg{padding:12px 32px;font-size:15px;font-weight:600;border-radius:10px}
.kyb-step{display:flex;gap:32px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.kyb-step-item{text-align:center;width:160px}
.kyb-step-num{width:32px;height:32px;background:rgba(255,202,0,.15);color:#FFCA00;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;margin:0 auto 12px}
.kyb-step-item .label{font-size:13px;color:#e8e8ed;font-weight:500}
.kyb-step-item .desc{font-size:11px;color:#848493;margin-top:4px}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">Y</div>
      <div class="logo-text">YASBe</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item"><span class="icon">📊</span> Dashboard</div>
      <div class="nav-item active"><span class="icon">💳</span> 卡片管理</div>
      <div class="nav-item"><span class="icon">📋</span> 账单记录</div>
      <div class="nav-item"><span class="icon">🏦</span> 银行账户</div>
      <div class="nav-item"><span class="icon">🔒</span> 安全设置</div>
    </div>
    <div class="sidebar-footer">
      <div class="avatar">DX</div>
      <div class="user-info">
        <div class="name">Driven Xie</div>
        <div>企业用户</div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Top Header -->
    <div class="top-header">
      <h1>卡片管理</h1>
      <div class="top-header-right">
        <button class="notif">🔔<span class="dot"></span></button>
        <div class="avatar-btn">DX</div>
      </div>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- ===== KYB未完成：引导页 ===== -->
      <div class="card">
        <div class="kyb-block">
          <div class="icon-wrap">🔐</div>
          <h2>企业认证未完成</h2>
          <p>使用卡片服务前，您需要先完成企业认证（KYB）。认证通过后即可开启开卡、充值、消费管理等全部功能。</p>
          <button class="btn btn-primary btn-lg">立即去认证</button>
          <div class="kyb-step">
            <div class="kyb-step-item">
              <div class="kyb-step-num">1</div>
              <div class="label">提交企业资料</div>
              <div class="desc">填写企业信息并上传证件</div>
            </div>
            <div class="kyb-step-item">
              <div class="kyb-step-num">2</div>
              <div class="label">平台审核</div>
              <div class="desc">YASBe 审核企业资质</div>
            </div>
            <div class="kyb-step-item">
              <div class="kyb-step-num">3</div>
              <div class="label">发卡方认证</div>
              <div class="desc">上游机构额外审核</div>
            </div>
            <div class="kyb-step-item">
              <div class="kyb-step-num">4</div>
              <div class="label">开启卡片服务</div>
              <div class="desc">自由开卡与管理</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
